<main class="form-container">
    <h2 class="form-title">Crear Cuenta</h2>
    <form id="registerForm" class="auth-form">
        <div class="form-group">
            <label for="username">Nombre de usuario</label>
            <input type="text" id="username" name="username" required placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required placeholder="tu@correo.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <div id="error-message" class="error-message hidden"></div>
        <button type="submit" class="btn btn-primary">Crear Cuenta</button>
        <p class="form-footer">¿Ya tienes cuenta? <a href="#02_login">Inicia sesión aquí</a></p>
    </form>
</main>
